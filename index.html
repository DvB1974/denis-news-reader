<script>
const DATA = JSON.parse(document.getElementById('data').textContent);
let state = {source:null, tag:null, q:'', sort:'date'};
const el = id => document.getElementById(id);
function esc(s) { return (s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])); }
function renderFilters() {
  el('sources').innerHTML = '<button class="chip '+(!state.source?'active':'')+'" data-source="">Alle</button>' + DATA.sources.map(s=>`<button class="chip ${state.source===s?'active':''}" data-source="${esc(s)}">${esc(s)}</button>`).join('');
  el('tags').innerHTML = '<button class="chip '+(!state.tag?'active':'')+'" data-tag="">Alle</button>' + DATA.tags.map(t=>`<button class="chip ${state.tag===t?'active':''}" data-tag="${esc(t)}">${esc(t)}</button>`).join('');
  document.querySelectorAll('[data-source]').forEach(b=>b.onclick=()=>{state.source=b.dataset.source||null; render();});
  document.querySelectorAll('[data-tag]').forEach(b=>b.onclick=()=>{state.tag=b.dataset.tag||null; render();});
}
function filtered() {
  let items = DATA.articles.slice();
  if (state.source) items = items.filter(a=>a.source===state.source);
  if (state.tag) items = items.filter(a=>a.tags.includes(state.tag));
  const q = state.q.trim().toLowerCase();
  if (q) items = items.filter(a => [a.title,a.original,a.summary,a.source,...a.tags].join(' ').toLowerCase().includes(q));
  items.sort((a,b)=> state.sort==='score' ? b.score-a.score : (b.published||'').localeCompare(a.published||''));
  return items;
}
function render() {
  renderFilters();
  el('sortDate').classList.toggle('active', state.sort==='date');
  el('sortScore').classList.toggle('active', state.sort==='score');
  const items = filtered();
  el('stats').textContent = `${items.length} van ${DATA.articles.length} artikelen · ${DATA.sources.length} bronnen`;
  el('list').innerHTML = items.map(a=>{
    const cls = a.score>=3 ? 'high' : a.score>=1 ? 'mid' : 'low';
    return `<article class="card"><div class="top"><div><a class="title" href="${esc(a.url)}" target="_blank" rel="noopener">${esc(a.title)}</a>${a.original && a.original!==a.title ? `<div class="orig">↑ Original: ${esc(a.original)}</div>` : ''}<div class="meta">${esc(a.source)} · ${esc(a.published)} ${a.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>${a.summary ? `<div class="summary">${esc(a.summary).slice(0,420)}</div>` : ''}</div><div class="score ${cls}">${a.score.toFixed(1)}</div></div></article>`;
  }).join('');
}
el('q').oninput = e => {state.q=e.target.value; render();};
el('sortDate').onclick = () => {state.sort='date'; render();};
el('sortScore').onclick = () => {state.sort='score'; render();};
el('clear').onclick = () => {state={source:null, tag:null, q:'', sort:'date'}; el('q').value=''; render();};
render();
</script>
